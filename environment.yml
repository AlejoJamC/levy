name: levy
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24.0
  - httpx>=0.24.0
  - python-dotenv>=1.0.0
  - redis-py>=5.0.0  # conda-forge package name for the python client; "redis" is the server
  - faiss-cpu>=1.7  # install via conda-forge (pip wheel segfaults on Apple Silicon arm64)
  - pytest>=8.0
  - pytest-cov>=5.0
  - pip:
    - sentence-transformers>=3.0
    - transformers>=4.48
    - anthropic>=0.40.0
